version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports: ["27017:27017"]

  redis:
    image: redis:alpine
    container_name: redis
    ports: ["6379:6379"]

  frontend:
    build: ./frontend
    container_name: frontend
    environment:
      - DANGEROUSLY_DISABLE_HOST_CHECK=true # Fixes "Invalid Host header"
    ports: ["3000:3000"]

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    environment:
      - MONGO_URI=mongodb://mongodb:27017/cms_db
    ports: ["4001:4001"]

  content-service:
    build: ./services/content-service
    container_name: content-service
    environment:
      - MONGO_URI=mongodb://mongodb:27017/cms_db
    ports: ["4002:4002"]

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports: ["80:80"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [frontend, auth-service, content-service]