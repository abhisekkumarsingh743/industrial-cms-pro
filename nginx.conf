events { worker_connections 1024; }
http {
    server {
        listen 80;
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
        }
        # Trailing slashes are critical for routing to microservices
        location /api/auth/ { proxy_pass http://auth-service:4001/; }
        location /api/content/ { proxy_pass http://content-service:4002/; }
        location /api/audit/ { proxy_pass http://audit-service:4003/; }
    }
}